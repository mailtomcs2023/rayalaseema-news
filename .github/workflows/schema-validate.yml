name: Schema Validation

# Spec #4 B6 (#202) — block merge if any JSON-LD generator regresses.
# Runs on every PR + on push-to-main. Cheap (single bun test invocation),
# so it's safe in the hot path of deploy.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck @rayalaseema/seo-schema
        run: bun --filter=@rayalaseema/seo-schema lint

      - name: Run schema generator tests
        run: bun --filter=@rayalaseema/seo-schema test
