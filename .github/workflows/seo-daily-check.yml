name: SEO Daily Health Check

# Spec #4 H7 (#240) — daily SEO health check.
# Runs nightly at 03:00 IST (21:30 UTC the previous day). Posts a digest
# to the SEO_HEALTH_WEBHOOK Slack/Discord/email-relay endpoint.

on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SEO daily check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_READONLY }}
          SEO_HEALTH_WEBHOOK: ${{ secrets.SEO_HEALTH_WEBHOOK }}
        run: bun packages/db/scripts/seo-daily-check.ts
