name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: 20.198.2.80
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          # 30m (was 10m): the OSM mandal-geocoding backfill is rate-limited at
          # 1.5s/req and now runs over ~250 mandals, pushing the full deploy
          # past 10m. Bumped so the build + PM2 restart aren't cut off.
          command_timeout: 30m
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"

            echo "=== Pull latest code ==="
            cd /home/azureuser/app

            # Clone or pull
            if [ ! -d ".git" ]; then
              git clone https://github.com/mailtomcs2023/rayalaseema-news.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "=== Install dependencies ==="
            bun install --frozen-lockfile || bun install

            # Spec #1 I1 #134 - pg_dump backup BEFORE any prisma db push.
            # Spec #1 Phase A1B (#188) renames FK columns and A1C (#189) drops
            # ~10 legacy tables. Either step is irrecoverable without a backup.
            # Backup runs on every deploy to keep the muscle memory consistent;
            # only the last 14 are kept to bound disk usage.
            echo "=== Backup database (pg_dump) ==="
            BACKUP_DIR=/home/azureuser/db-backups
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            PGPASSWORD='RayalaseemaExpress2026!' pg_dump -h localhost -U reapp -d rayalaseema_express \
              --no-owner --no-privileges \
              | gzip > "$BACKUP_FILE"
            echo "Backup written to $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"
            # Keep the 14 most recent backups; delete older ones.
            ls -1t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f

            echo "=== Generate Prisma client ==="
            cd packages/db
            bunx prisma generate

            echo "=== Migrate CHIEF_SUB_EDITOR users → EDITOR (must run BEFORE db push) ==="
            # Idempotent. Required because schema.prisma no longer carries the
            # CHIEF_SUB_EDITOR enum value; any users still on that role would
            # block `prisma db push` with an enum-validation error.
            bunx tsx scripts/migrate-chief-sub-editor.ts

            bunx prisma db push --skip-generate --accept-data-loss

            echo "=== Backfill 6-digit userCode for any user without one ==="
            # Idempotent: skips users that already have a code. Generated codes
            # avoid weak/sequential patterns (000000, 123456, etc.). Required
            # after the userCode column was added so existing accounts can
            # log in by code, not just email.
            bunx tsx scripts/backfill-user-codes.ts

            echo "=== Merge legacy seed admin into live admin, then delete it (idempotent) ==="
            # Folds admin@rayalaseemaexpress.com (old rebrand-orphaned seed
            # admin) into admin@rayalaseemanews.com and removes it. No-ops once
            # done. Runs AFTER the pg_dump backup above so it's recoverable.
            bunx tsx scripts/merge-legacy-admin.ts

            echo "=== Rebuild constituencies (idempotent: inserts missing ACs + remaps old) ==="
            bunx tsx scripts/rebuild-constituencies.ts
            bunx tsx scripts/remap-constituencies.ts

            echo "=== Verify constituency state ==="
            bunx tsx scripts/verify-constituencies.ts | tail -30

            echo "=== Seed desks (root + districts + ACs + topical + editorial) ==="
            bunx tsx scripts/seed-desks.ts

            echo "=== Backfill article deskId for any article still missing one ==="
            bunx tsx scripts/backfill-desks.ts

            echo "=== Backfill Telugu mandal names ==="
            bunx tsx scripts/backfill-mandal-telugu.ts

            echo "=== Backfill OSM lat/lng for districts/constituencies/mandals (Spec #4 A3) ==="
            # Idempotent: skips rows with both lat+lng set; only hits Nominatim
            # for newly-added rows. Rate-limited at 1.5s/req per OSM fair-use
            # policy. First-time full run is ~6 min; subsequent deploys ~5 sec
            # (no rows to query). Safe to leave in the deploy hot path.
            bunx tsx scripts/backfill-osm-coords.ts || echo "OSM backfill failed - non-fatal, manual re-run later"

            echo "=== Seed e-paper v2 templates (front + 8 district + 4 section) ==="
            bunx tsx scripts/seed-epaper-templates.ts
            echo "=== Seed e-paper v2 masters (#108: front/district/section) ==="
            bunx tsx scripts/seed-epaper-masters.ts
            echo "=== Seed cinema/sports sub-genre categories (tollywood/bollywood/hollywood/tv/cricket/ipl) ==="
            # Idempotent upsert. Creates tv + ipl (never seeded) and confirms the
            # editor-added sub-genres so the homepage filter tabs resolve.
            bunx tsx scripts/seed-subgenre-categories.ts
            echo "=== Seed page-builder templates (Spec #2: homepage + category + movie-reviews) ==="
            bunx tsx scripts/seed-templates.ts
            echo "=== Patch SectionBand tabs: enable in-place filtering + fix AP/sports mis-links (idempotent) ==="
            # seed-templates is skip-if-exists, so it can't repair already-seeded
            # SectionBand tabs. This backfills each tab's categorySlug and fixes
            # the politics AP tab (was → /category/politics). No-ops once correct.
            bunx tsx scripts/patch-section-band-tabs.ts
            echo "=== Seed menus (Spec #3: header + footer + mobile) ==="
            bunx tsx scripts/seed-menus.ts
            echo "=== Patch HEADER/MOBILE menus: add రాశి ఫలాలు (/horoscope) if missing (idempotent) ==="
            # seed-menus is skip-if-exists, so it can't add horoscope to the
            # already-seeded menus. This patches the existing rows to match the
            # hardcoded header fallback. No-ops once the item is present.
            bunx tsx scripts/patch-header-horoscope.ts
            echo "=== Seed category tag suggestions (chip row under Tags input) ==="
            # Idempotent: re-running upserts Tag rows + skips existing
            # CategoryTagSuggestion links. Editor work - to add tags for a
            # newly-created category, edit scripts/seed-category-tags.ts
            # and re-deploy.
            bunx tsx scripts/seed-category-tags.ts
            cd ../..

            echo "=== Install Playwright Chromium (e-paper render) ==="
            cd apps/admin
            bunx playwright install --with-deps chromium || bunx playwright install chromium || true
            cd ../..

            echo "=== Create production env files ==="
            cat > apps/web/.env << 'ENV'
            DATABASE_URL="postgresql://reapp:RayalaseemaExpress2026!@localhost:5432/rayalaseema_express"
            SITE_URL="https://rayalaseemanews.com"
            AZURE_OPENAI_ENDPOINT="https://rayalaseema-ai.openai.azure.com/"
            AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}"
            AZURE_OPENAI_DEPLOYMENT="gpt51"
            AZURE_OPENAI_API_VERSION="2024-10-21"
            RAPIDAPI_CRICKET_KEY="${{ secrets.RAPIDAPI_CRICKET_KEY }}"
            AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            AZURE_SPEECH_KEY="${{ secrets.AZURE_SPEECH_KEY }}"
            AZURE_SPEECH_REGION="centralindia"
            AZURE_SPEECH_VOICE="te-IN-MohanNeural"
            ENV

            cat > apps/admin/.env << 'ENV'
            DATABASE_URL="postgresql://reapp:RayalaseemaExpress2026!@localhost:5432/rayalaseema_express"
            NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
            NEXTAUTH_URL="https://admin.rayalaseemanews.com"
            AZURE_OPENAI_ENDPOINT="https://rayalaseema-ai.openai.azure.com/"
            AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}"
            AZURE_OPENAI_DEPLOYMENT="gpt51"
            AZURE_OPENAI_API_VERSION="2024-10-21"
            NEWSDATA_API_KEY="${{ secrets.NEWSDATA_API_KEY }}"
            PTI_CENTERCODE="${{ secrets.PTI_CENTERCODE }}"
            PEXELS_API_KEY="${{ secrets.PEXELS_API_KEY }}"
            GOOGLE_CSE_KEY="${{ secrets.GOOGLE_CSE_KEY }}"
            GOOGLE_CSE_ID="${{ secrets.GOOGLE_CSE_ID }}"
            # Azure image generation (gpt-image-2 deployment, sweden central).
            # Separate resource from the OpenAI chat one because image models
            # aren't available in south india.
            AZURE_IMAGES_ENDPOINT="${{ secrets.AZURE_IMAGES_ENDPOINT }}"
            AZURE_IMAGES_KEY="${{ secrets.AZURE_IMAGES_KEY }}"
            AZURE_IMAGES_DEPLOYMENT="gpt-image"
            AZURE_IMAGES_API_VERSION="2025-04-01-preview"
            AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            # Field-level encryption key for KYC PII (Aadhaar/PAN/bank). The
            # /api/onboarding/kyc PATCH encrypts these on save; without this
            # key encrypt() throws and the save 500s. 32-byte base64 - rotate
            # via the GitHub secret, never commit a real value.
            KYC_ENCRYPTION_KEY="${{ secrets.KYC_ENCRYPTION_KEY }}"
            # Bearer secret for the cron endpoints (/api/cron/horoscope,
            # /api/cron/fetch-precious-metals). Without it those routes 503.
            CRON_SECRET="${{ secrets.CRON_SECRET }}"
            ENV

            echo "=== Build apps ==="
            export NODE_OPTIONS="--max-old-space-size=3072"
            # Clear any stale .next first - a killed/timed-out build leaves a
            # Turbopack lock ("previous build didn't exit cleanly") that fails
            # every subsequent build. .next is gitignored so reset --hard won't
            # clear it; do it explicitly for a clean, reliable build.
            rm -rf apps/web/.next apps/admin/.next
            cd apps/web && bun run build && cd ../..
            cd apps/admin && bun run build && cd ../..

            echo "=== Seed database (first deploy only) ==="
            cd packages/db
            bunx tsx prisma/seed.ts 2>/dev/null || echo "Seed skipped (already seeded)"
            cd ../..

            echo "=== Restart with PM2 ==="
            pm2 delete all 2>/dev/null || true

            pm2 start "bun run start" --name "web" --cwd /home/azureuser/app/apps/web -- -p 3000
            pm2 start "bun run start" --name "admin" --cwd /home/azureuser/app/apps/admin -- -p 3001

            pm2 save

            # Wait for processes to stabilize
            sleep 5

            echo "=== PM2 Status ==="
            pm2 list
            echo "=== Admin Logs ==="
            pm2 logs admin --nostream --lines 20 2>/dev/null || true
            echo "=== Web Logs ==="
            pm2 logs web --nostream --lines 20 2>/dev/null || true
            echo "=== Deploy complete! ==="
