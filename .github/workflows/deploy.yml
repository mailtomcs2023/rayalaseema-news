name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: 20.198.2.80
          username: azureuser
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"

            echo "=== Pull latest code ==="
            cd /home/azureuser/app

            # Clone or pull
            if [ ! -d ".git" ]; then
              git clone https://github.com/mailtomcs2023/rayalaseema-express.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            echo "=== Install dependencies ==="
            bun install --frozen-lockfile || bun install

            # Spec #1 I1 #134 — pg_dump backup BEFORE any prisma db push.
            # Spec #1 Phase A1B (#188) renames FK columns and A1C (#189) drops
            # ~10 legacy tables. Either step is irrecoverable without a backup.
            # Backup runs on every deploy to keep the muscle memory consistent;
            # only the last 14 are kept to bound disk usage.
            echo "=== Backup database (pg_dump) ==="
            BACKUP_DIR=/home/azureuser/db-backups
            mkdir -p "$BACKUP_DIR"
            BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
            PGPASSWORD='RayalaseemaExpress2026!' pg_dump -h localhost -U reapp -d rayalaseema_express \
              --no-owner --no-privileges \
              | gzip > "$BACKUP_FILE"
            echo "Backup written to $BACKUP_FILE ($(du -h "$BACKUP_FILE" | cut -f1))"
            # Keep the 14 most recent backups; delete older ones.
            ls -1t "$BACKUP_DIR"/pre-deploy-*.sql.gz 2>/dev/null | tail -n +15 | xargs -r rm -f

            echo "=== Generate Prisma client ==="
            cd packages/db
            bunx prisma generate
            bunx prisma db push --skip-generate --accept-data-loss

            echo "=== Rebuild constituencies (idempotent: inserts missing ACs + remaps old) ==="
            bunx tsx scripts/rebuild-constituencies.ts
            bunx tsx scripts/remap-constituencies.ts

            echo "=== Verify constituency state ==="
            bunx tsx scripts/verify-constituencies.ts | tail -30

            echo "=== Seed desks (root + districts + ACs + topical + editorial) ==="
            bunx tsx scripts/seed-desks.ts

            echo "=== Backfill article deskId for any article still missing one ==="
            bunx tsx scripts/backfill-desks.ts

            echo "=== Backfill Telugu mandal names ==="
            bunx tsx scripts/backfill-mandal-telugu.ts

            echo "=== Seed e-paper v2 templates (front + 8 district + 4 section) ==="
            bunx tsx scripts/seed-epaper-templates.ts
            echo "=== Seed e-paper v2 masters (#108: front/district/section) ==="
            bunx tsx scripts/seed-epaper-masters.ts
            echo "=== Seed page-builder templates (Spec #2: homepage + category + movie-reviews) ==="
            bunx tsx scripts/seed-templates.ts
            cd ../..

            echo "=== Install Playwright Chromium (e-paper render) ==="
            cd apps/admin
            bunx playwright install --with-deps chromium || bunx playwright install chromium || true
            cd ../..

            echo "=== Create production env files ==="
            cat > apps/web/.env << 'ENV'
            DATABASE_URL="postgresql://reapp:RayalaseemaExpress2026!@localhost:5432/rayalaseema_express"
            SITE_URL="https://rayalaseemaexpress.com"
            AZURE_OPENAI_ENDPOINT="https://rayalaseema-ai.openai.azure.com/"
            AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}"
            AZURE_OPENAI_DEPLOYMENT="gpt51"
            AZURE_OPENAI_API_VERSION="2024-10-21"
            RAPIDAPI_CRICKET_KEY="${{ secrets.RAPIDAPI_CRICKET_KEY }}"
            AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            AZURE_SPEECH_KEY="${{ secrets.AZURE_SPEECH_KEY }}"
            AZURE_SPEECH_REGION="centralindia"
            AZURE_SPEECH_VOICE="te-IN-MohanNeural"
            ENV

            cat > apps/admin/.env << 'ENV'
            DATABASE_URL="postgresql://reapp:RayalaseemaExpress2026!@localhost:5432/rayalaseema_express"
            NEXTAUTH_SECRET="${{ secrets.NEXTAUTH_SECRET }}"
            NEXTAUTH_URL="https://admin.rayalaseemaexpress.com"
            AZURE_OPENAI_ENDPOINT="https://rayalaseema-ai.openai.azure.com/"
            AZURE_OPENAI_KEY="${{ secrets.AZURE_OPENAI_KEY }}"
            AZURE_OPENAI_DEPLOYMENT="gpt51"
            AZURE_OPENAI_API_VERSION="2024-10-21"
            NEWSDATA_API_KEY="${{ secrets.NEWSDATA_API_KEY }}"
            AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
            ENV

            echo "=== Build apps ==="
            export NODE_OPTIONS="--max-old-space-size=3072"
            cd apps/web && bun run build && cd ../..
            cd apps/admin && bun run build && cd ../..

            echo "=== Seed database (first deploy only) ==="
            cd packages/db
            bunx tsx prisma/seed.ts 2>/dev/null || echo "Seed skipped (already seeded)"
            cd ../..

            echo "=== Restart with PM2 ==="
            pm2 delete all 2>/dev/null || true

            pm2 start "bun run start" --name "web" --cwd /home/azureuser/app/apps/web -- -p 3000
            pm2 start "bun run start" --name "admin" --cwd /home/azureuser/app/apps/admin -- -p 3001

            pm2 save

            # Wait for processes to stabilize
            sleep 5

            echo "=== PM2 Status ==="
            pm2 list
            echo "=== Admin Logs ==="
            pm2 logs admin --nostream --lines 20 2>/dev/null || true
            echo "=== Web Logs ==="
            pm2 logs web --nostream --lines 20 2>/dev/null || true
            echo "=== Deploy complete! ==="
