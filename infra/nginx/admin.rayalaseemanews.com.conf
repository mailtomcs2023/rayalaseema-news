# Rayalaseema News - admin subdomain (admin app on :3001)
# /etc/nginx/sites-available/rayalaseema-news-admin
# After dropping in:
#   sudo ln -sf /etc/nginx/sites-available/rayalaseema-news-admin /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d admin.rayalaseemanews.com

server {
    listen 80;
    listen [::]:80;
    server_name admin.rayalaseemanews.com;

    # certbot --nginx will rewrite this block to redirect to HTTPS and add SSL listeners.

    client_max_body_size 50m;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # AI image edits (/api/images/enhance -> Azure gpt-image) and other
        # AI routes can take well over a minute; 60s caused 504s. 180s.
        proxy_read_timeout 180s;
    }
}
