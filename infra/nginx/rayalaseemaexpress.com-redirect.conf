# Legacy domains - 301 every request to rayalaseemanews.com
# Replaces the old /etc/nginx/sites-available/rayalaseema once new domain is live + certified.
#
# Covers:
#   - rayalaseemaexpress.com (apex + www)
#   - rayalaseemaexpress.in  (apex + www) - preserved for 301; no new .in TLD purchased.

server {
    listen 80;
    listen [::]:80;
    server_name rayalaseemaexpress.com www.rayalaseemaexpress.com
                rayalaseemaexpress.in  www.rayalaseemaexpress.in;
    return 301 https://rayalaseemanews.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rayalaseemaexpress.com www.rayalaseemaexpress.com;

    ssl_certificate     /etc/letsencrypt/live/rayalaseemaexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rayalaseemaexpress.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://rayalaseemanews.com$request_uri;
}

# Note: rayalaseemaexpress.in had no certificate in the original config, so we keep it HTTP-only
# (the :80 block above redirects it to https://rayalaseemanews.com).
