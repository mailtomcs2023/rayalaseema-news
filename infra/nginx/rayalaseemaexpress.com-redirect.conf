# Rayalaseema Express — legacy domain, 301 every request to rayalaseemanews.com
# /etc/nginx/sites-available/rayalaseemaexpress.com.conf
#
# After the new domain is live + certbot has issued certs for the old domain too:
#   certbot --nginx -d rayalaseemaexpress.com -d www.rayalaseemaexpress.com
# Keep certbot renewals running for the old domain as long as the redirect is live.

server {
    listen 80;
    listen [::]:80;
    server_name rayalaseemaexpress.com www.rayalaseemaexpress.com;
    return 301 https://rayalaseemanews.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rayalaseemaexpress.com www.rayalaseemaexpress.com;

    ssl_certificate     /etc/letsencrypt/live/rayalaseemaexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rayalaseemaexpress.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Preserve path + query on every redirect so SEO equity transfers per-URL
    return 301 https://rayalaseemanews.com$request_uri;
}
