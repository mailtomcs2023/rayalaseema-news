# Legacy admin subdomain — 301 to admin.rayalaseemanews.com
# Replaces /etc/nginx/sites-available/rayalaseema-admin once new admin domain is live.

server {
    listen 80;
    listen [::]:80;
    server_name admin.rayalaseemaexpress.com;
    return 301 https://admin.rayalaseemanews.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.rayalaseemaexpress.com;

    ssl_certificate     /etc/letsencrypt/live/admin.rayalaseemaexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.rayalaseemaexpress.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://admin.rayalaseemanews.com$request_uri;
}
