# Rayalaseema News — primary domain
# /etc/nginx/sites-available/rayalaseemanews.com.conf
# After dropping in: ln -s ../sites-available/rayalaseemanews.com.conf /etc/nginx/sites-enabled/
# Then: certbot --nginx -d rayalaseemanews.com -d www.rayalaseemanews.com

# www -> apex redirect (301)
server {
    listen 80;
    listen [::]:80;
    server_name www.rayalaseemanews.com;
    return 301 https://rayalaseemanews.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rayalaseemanews.com;

    # certbot will inject ssl_certificate / ssl_certificate_key lines here
    ssl_certificate     /etc/letsencrypt/live/rayalaseemanews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rayalaseemanews.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://rayalaseemanews.com$request_uri;
}

# Apex — serves the Next.js web app on :3000 via PM2
server {
    listen 80;
    listen [::]:80;
    server_name rayalaseemanews.com;
    # certbot will add the redirect-to-https + ssl block below
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rayalaseemanews.com;

    ssl_certificate     /etc/letsencrypt/live/rayalaseemanews.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rayalaseemanews.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    # Static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
