# Rayalaseema News - primary domain (web app on :3000)
# /etc/nginx/sites-available/rayalaseema-news
# After dropping in:
#   sudo ln -sf /etc/nginx/sites-available/rayalaseema-news /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d rayalaseemanews.com -d www.rayalaseemanews.com

server {
    listen 80;
    listen [::]:80;
    server_name rayalaseemanews.com www.rayalaseemanews.com;

    # certbot --nginx will rewrite this block to redirect to HTTPS and add SSL listeners.
    # For pre-certbot state we serve the app directly on :80 so the certbot HTTP-01
    # challenge has a working server to respond from.

    client_max_body_size 50m;

    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
