# Rayalaseema News - e-paper subdomain.
# Same web app as the primary domain (apps/web on :3000) - the app's Next.js
# middleware detects the `epaper.` host and serves the /epaper subtree at the
# root with clean URLs. So this is just a thin proxy to :3000 with Host kept.
#
# /etc/nginx/sites-available/rayalaseema-news-epaper
# After dropping in:
#   sudo ln -sf /etc/nginx/sites-available/rayalaseema-news-epaper /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d epaper.rayalaseemanews.com
#
# Also required: set NEXT_PUBLIC_EPAPER_URL=https://epaper.rayalaseemanews.com
# in apps/web/.env and rebuild/restart the web app, then a DNS A/CNAME record
# for epaper.rayalaseemanews.com pointing at this server.

server {
    listen 80;
    listen [::]:80;
    server_name epaper.rayalaseemanews.com;

    # certbot --nginx will rewrite this block to redirect to HTTPS and add SSL listeners.

    client_max_body_size 50m;

    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
        proxy_pass http://localhost:3000;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        # Host must be forwarded as-is - the app's middleware keys off the
        # `epaper.` hostname to map the /epaper subtree to the root.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
